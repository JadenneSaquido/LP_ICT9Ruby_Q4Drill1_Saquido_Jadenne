<body>

<div class="container">

<h2> Electricity Consumption Classifier </h2>

<input type="number" id="kilowatt" placeholder=" Input kilowatt per hour 🐰 ">

<button onclick="evaluateKilowatt()"> Consumption Classification </button>

</div>

<script>

function evaluateKilowatt(){

var kilowatt = document.getElementById("kilowatt").value;

if(kilowatt === ""){
    alert("Please enter a kilowatt value. 😓");
    return;
}

var category = "";

if(kilowatt >= 0 && kilowatt <= 100){
    category = " Lifeline Consumer";
    description = " Discounted electricity rates. 😮 ";
}

else if(kilowatt >= 101 && kilowatt <= 200){
    category = " Low Consumption";
    description = " Normal residential rate. 😌 ";
}

else if(kilowatt >= 201 && kilowatt <= 300){

}

else if(kilowatt >= 301 && kilowatt <= 500){
